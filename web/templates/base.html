<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <title>{{ title }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="/static/app.js" defer></script>
    <link rel="stylesheet" href="/static/app.css">
  </head>
  <body>
    <header class="shell-header">
      <div class="shell-brand">
        <div class="shell-brand-mark">DY</div>
        <div class="shell-brand-copy">
          <h1>DouYin_Spider Web UI</h1>
          <p>本机调试作战台：登录、采集、获客、触达、监听全链路集中操作。</p>
        </div>
      </div>
      <nav class="shell-nav">
        <a href="/" class="{% if request.url.path == '/' %}is-active{% endif %}">概览</a>
        <a href="/acquisition-dashboard" class="{% if request.url.path == '/acquisition-dashboard' %}is-active{% endif %}">获客仪表盘</a>
        <a href="/lead-pool" class="{% if request.url.path == '/lead-pool' %}is-active{% endif %}">线索池</a>
        <a href="/outreach-center" class="{% if request.url.path == '/outreach-center' %}is-active{% endif %}">触达中心</a>
        <a href="/conversion-tracking" class="{% if request.url.path == '/conversion-tracking' %}is-active{% endif %}">转化跟踪</a>
        <a href="/rules-center" class="{% if request.url.path == '/rules-center' %}is-active{% endif %}">规则中心</a>
        <a href="/login" class="{% if request.url.path == '/login' %}is-active{% endif %}">登录中心</a>
        <a href="/data-crawl" class="{% if request.url.path == '/data-crawl' %}is-active{% endif %}">数据抓取</a>
        <a href="/keyword-funnel" class="{% if request.url.path == '/keyword-funnel' %}is-active{% endif %}">关键词截流</a>
        <a href="/live-monitor" class="{% if request.url.path == '/live-monitor' %}is-active{% endif %}">直播监听</a>
        <a href="/private-messages" class="{% if request.url.path == '/private-messages' %}is-active{% endif %}">私信中心</a>
        <a href="/tasks" class="{% if request.url.path == '/tasks' %}is-active{% endif %}">任务与日志</a>
        <a href="/settings" class="{% if request.url.path == '/settings' %}is-active{% endif %}">设置</a>
        <a href="/api-tools" class="{% if request.url.path == '/api-tools' %}is-active{% endif %}">接口工具</a>
      </nav>
    </header>
    <div id="app-toast-stack" aria-live="assertive" aria-atomic="true"></div>
    <main>
      {% block content %}{% endblock %}
    </main>
  </body>
</html>

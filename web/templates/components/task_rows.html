<table class="task-table">
  <thead>
    <tr>
      <th>任务ID</th>
      <th>类型</th>
      <th>状态</th>
      <th>摘要</th>
      <th>错误</th>
    </tr>
  </thead>
  <tbody>
    {% for task in tasks %}
    <tr
      data-task-id="{{ task['task_id'] }}"
      data-task-type="{{ task['task_type'] }}"
      data-task-status="{{ task['status'] }}"
      data-task-summary="{{ task['summary'] or '' }}"
      data-task-error="{{ task['error_summary'] or task['traceback'] or '' }}"
    >
      <td>{{ task["task_id"] }}</td>
      <td>{{ task["task_type"] }}</td>
      <td>{{ task["status"] }}</td>
      <td>{{ task["summary"] }}</td>
      <td>
        {% set error_text = task["traceback"] or task["error_summary"] %}
        {% include "components/error_panel.html" %}
      </td>
    </tr>
    {% else %}
    <tr>
      <td colspan="5">暂无任务。</td>
    </tr>
    {% endfor %}
  </tbody>
</table>

<section class="ops-panel ops-surface-table">
  <div class="ops-panel-head">
    <h3>待触达队列</h3>
    <span>优先处理消息状态仍为待触达的线索</span>
  </div>
  <table>
    <thead>
      <tr>
        <th>昵称</th>
        <th>来源</th>
        <th>关键词</th>
        <th>评论内容</th>
        <th>消息状态</th>
      </tr>
    </thead>
    <tbody>
      {% if queue %}
        {% for lead in queue %}
        <tr>
          <td>{{ lead.nickname }}</td>
          <td>{{ lead.source_type }}</td>
          <td>{{ lead.keyword }}</td>
          <td>{{ lead.comment_text or "-" }}</td>
          <td>{{ lead.message_status }}</td>
        </tr>
        {% endfor %}
      {% else %}
        <tr>
          <td colspan="5">暂无待触达线索</td>
        </tr>
      {% endif %}
    </tbody>
  </table>
</section>
